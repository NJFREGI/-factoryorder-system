<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>汉印TP80NY 云打印测试</title>
<style>
:root{--P:#2563EB;--PD:#1d4ed8;--G:#059669;--R:#dc2626;--O:#d97706;--bg:#f8f9fa;--w:#fff;--t:#1a1a1a;--t2:#555;--t3:#999;--b:#dee2e6;--r:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans JP','Noto Sans SC','Hiragino Sans',sans-serif;background:var(--bg);color:var(--t);min-height:100vh;padding:16px}
h1{font-size:18px;font-weight:800;color:var(--P);margin-bottom:2px}
.sub{font-size:12px;color:var(--t3);margin-bottom:18px}
.card{background:var(--w);border-radius:var(--r);border:1px solid var(--b);padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.card-title{font-size:14px;font-weight:700;margin-bottom:12px}
.btn{width:100%;padding:13px;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s;margin-bottom:8px}
.btn:last-child{margin-bottom:0}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-p{background:var(--P);color:#fff}.btn-p:not(:disabled):active{background:var(--PD)}
.btn-g{background:var(--G);color:#fff}
.btn-o{background:var(--O);color:#fff}
.btn-r{background:var(--R);color:#fff}
.btn-out{background:var(--w);color:var(--t2);border:1.5px solid var(--b)}
.status{display:flex;align-items:center;gap:8px;padding:10px 13px;border-radius:8px;font-size:13px;font-weight:500;margin-bottom:10px}
.status.ok{background:#ecfdf5;color:#065f46;border:1px solid #6ee7b7}
.status.err{background:#fef2f2;color:#991b1b;border:1px solid #fca5a5}
.status.info{background:#eff6ff;color:#1e40af;border:1px solid #93c5fd}
.status.warn{background:#fffbeb;color:#92400e;border:1px solid #fcd34d}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.dot-g{background:var(--G)}.dot-r{background:var(--R)}.dot-o{background:var(--O)}.dot-b{background:var(--P)}
.log{background:#0f172a;color:#94a3b8;border-radius:8px;padding:12px;font-family:monospace;font-size:11px;min-height:100px;max-height:240px;overflow-y:auto;line-height:1.7}
.log .ok{color:#4ade80}.log .err{color:#f87171}.log .info{color:#60a5fa}.log .warn{color:#fbbf24}
.note{font-size:12px;color:var(--t3);line-height:1.6;padding:8px 10px;background:var(--bg);border-radius:6px;margin-top:4px}
.row{display:flex;gap:8px}
.row .btn{margin-bottom:0;flex:1}
.form-input{width:100%;padding:10px 12px;border:1.5px solid var(--b);border-radius:8px;font-size:13px;font-family:inherit;margin-bottom:8px;background:var(--w)}
.form-input:focus{outline:none;border-color:var(--P)}
.form-label{font-size:12px;font-weight:600;color:var(--t2);margin-bottom:4px;display:block}
</style>
</head>
<body>

<h1>🖨️ 汉印 TP80NY 云打印</h1>
<p class="sub">汉印云 OpenAPI · ESC格式 · 无需蓝牙</p>

<!-- 配置 -->
<div class="card">
  <div class="card-title">① 打印机配置</div>
  <label class="form-label">Worker代理地址（部署后填入）</label>
  <input class="form-input" id="workerUrl" placeholder="https://your-worker.workers.dev" value="">
  <label class="form-label">user_key</label>
  <input class="form-input" id="userKey" value="f4dedc24818d11f0840a043f72a0b6f2">
  <label class="form-label">user_secret</label>
  <input class="form-input" id="userSecret" value="f4deeb55818d11f0840a043f72a0b6f2">
  <label class="form-label">设备SN号</label>
  <input class="form-input" id="equipSn" value="TP80NY1525310584">
  <button class="btn btn-p" onclick="testConnection()">🔗 测试连接</button>
  <div class="note">⚠️ 需要先部署Cloudflare Worker，填入Worker地址后才能使用。</div>
</div>

<!-- 测试打印 -->
<div class="card">
  <div class="card-title">② 打印测试</div>
  <button class="btn btn-g" id="btnTest" onclick="printTest()">🧾 打印测试小票</button>
  <div class="row" style="margin-top:8px">
    <button class="btn btn-o" onclick="printSampleOrder()">📋 打印示例订单</button>
  </div>
</div>

<!-- 日志 -->
<div class="card">
  <div class="card-title">日志 <span id="logCount" style="font-size:11px;color:var(--t3);font-weight:400"></span></div>
  <div class="log" id="log">等待操作...</div>
  <button class="btn btn-out" style="margin-top:8px;padding:8px;font-size:12px" onclick="clearLog()">清除</button>
</div>

<script>
// ══ 配置 ══
const WORKER_URL_KEY = 'hprt_worker_url';

// 自动恢复保存的Worker地址
window.addEventListener('load', () => {
  const saved = localStorage.getItem(WORKER_URL_KEY);
  if (saved) document.getElementById('workerUrl').value = saved;
});

// ── LOG ──
let logLines = 0;
function log(msg, type='') {
  const el = document.getElementById('log');
  if (el.innerHTML === '等待操作...') el.innerHTML = '';
  const d = document.createElement('div');
  d.className = type;
  const t = new Date().toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  d.textContent = `[${t}] ${msg}`;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
  logLines++;
  document.getElementById('logCount').textContent = `(${logLines}条)`;
}
function clearLog() {
  document.getElementById('log').innerHTML = '等待操作...';
  logLines = 0;
  document.getElementById('logCount').textContent = '';
}

// ── 获取配置 ──
function getConfig() {
  const workerUrl = document.getElementById('workerUrl').value.trim().replace(/\/$/, '');
  const userKey = document.getElementById('userKey').value.trim();
  const userSecret = document.getElementById('userSecret').value.trim();
  const equipSn = document.getElementById('equipSn').value.trim();
  if (!workerUrl) { log('请先填入Worker代理地址', 'err'); return null; }
  if (!userKey || !userSecret || !equipSn) { log('请填写完整配置', 'err'); return null; }
  localStorage.setItem(WORKER_URL_KEY, workerUrl);
  return { workerUrl, userKey, userSecret, equipSn };
}

// ── 发送打印任务 ──
async function sendPrint(content, orderNo = '') {
  const cfg = getConfig();
  if (!cfg) return false;

  log(`发送打印任务... SN=${cfg.equipSn}`, 'info');

  try {
    const resp = await fetch(cfg.workerUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        user_key: cfg.userKey,
        user_secret: cfg.userSecret,
        equipment_sn: cfg.equipSn,
        content: content,
        print_type: 'ESC',
        order_no: orderNo,
      }),
    });

    const result = await resp.json();
    log(`响应: ${JSON.stringify(result)}`, result.status ? 'ok' : 'err');

    if (result.status) {
      log('✅ 打印任务发送成功！', 'ok');
      return true;
    } else {
      log(`❌ 打印失败: ${result.msg || '未知错误'}`, 'err');
      return false;
    }
  } catch(e) {
    log(`❌ 请求错误: ${e.message}`, 'err');
    return false;
  }
}

// ── 测试连接 ──
async function testConnection() {
  const cfg = getConfig();
  if (!cfg) return;
  log('测试连接中...', 'info');
  // 发送一个简单的测试内容
  const content = buildText([
    { text: '连接测试', align: 'center', bold: true, size: 'large' },
    { text: '─────────────────', align: 'center' },
    { text: `时间: ${new Date().toLocaleString('zh-CN')}` },
    { text: `SN: ${cfg.equipSn}` },
    { text: '连接成功！', align: 'center', bold: true },
  ]);
  await sendPrint(content, 'test_' + Date.now());
}

// ── ESC内容构建器 ──
// 汉印云ESC格式: <Sp W=0x00 H=0x00>文字<BR><DefineCut>
function buildText(lines) {
  // 汉印云ESC文本格式
  let content = '<Sp W=0x00 H=0x00>';
  
  for (const line of lines) {
    const text = line.text || '';
    const align = line.align || 'left';
    const bold = line.bold || false;
    const size = line.size || 'normal'; // normal / large
    
    let str = '';
    
    // 对齐
    if (align === 'center') str += '<center>';
    else if (align === 'right') str += '<right>';
    else str += '<left>';
    
    // 加粗
    if (bold) str += '<bold>';
    
    // 字体大小
    if (size === 'large') str += '<FontSize W=2 H=2>';
    
    str += text;
    
    // 结束标签
    if (size === 'large') str += '<FontSize W=1 H=1>';
    if (bold) str += '</bold>';
    str += '<BR>';
    
    content += str;
  }
  
  content += '<DefineCut>';
  return content;
}

// ── 打印测试小票 ──
async function printTest() {
  log('准备打印测试小票...', 'info');
  const now = new Date().toLocaleString('zh-CN');
  
  const content = buildText([
    { text: '受発注システム', align: 'center', bold: true, size: 'large' },
    { text: '────────────────', align: 'center' },
    { text: now, align: 'center' },
    { text: '────────────────', align: 'center' },
    { text: '干豆腐  500g/袋         x2' },
    { text: '  単価 ¥300         ¥600' },
    { text: '国産牛ロース 200g      x1' },
    { text: '  単価 ¥2800       ¥2800' },
    { text: '────────────────', align: 'center' },
    { text: 'TOTAL: ¥3,400', align: 'right', bold: true },
    { text: '', },
    { text: 'Cloud Print Test OK!', align: 'center' },
    { text: '汉印云 + ESC格式', align: 'center' },
    { text: '', },
    { text: '', },
  ]);
  
  await sendPrint(content, 'test_' + Date.now());
}

// ── 打印示例订单 ──
async function printSampleOrder() {
  log('准备打印示例订单...', 'info');
  const date = new Date().toLocaleDateString('zh-CN');
  
  const content = buildText([
    { text: '送  り  状', align: 'center', bold: true, size: 'large' },
    { text: '────────────────', align: 'center' },
    { text: `注文番号: #12` },
    { text: `店舗名:   銀座店` },
    { text: `日付:     ${date}` },
    { text: `状態:     出荷済` },
    { text: '────────────────', align: 'center' },
    { text: '商品             数量  金額', bold: true },
    { text: '────────────────', align: 'center' },
    { text: '干豆腐 500g/袋' },
    { text: '  単価¥300      x2    ¥600' },
    { text: '豚バラスライス 300g' },
    { text: '  単価¥680      x3   ¥2040' },
    { text: '鶏もも肉 500g' },
    { text: '  単価¥480      x1    ¥480' },
    { text: '────────────────', align: 'center' },
    { text: '小計:          ¥3120', align: 'right' },
    { text: '消費税(8%):     ¥249', align: 'right' },
    { text: '合計:          ¥3369', align: 'right', bold: true, size: 'large' },
    { text: '────────────────', align: 'center' },
    { text: '受取サイン:' },
    { text: '' },
    { text: '日付:' },
    { text: '' },
    { text: '' },
  ]);
  
  await sendPrint(content, 'order_' + Date.now());
}
</script>
</body>
</html>
